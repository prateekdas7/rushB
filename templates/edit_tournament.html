{% extends "base.html" %}

{% block title %}Edit Tournament - RushB{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h1 class="display-4">
            <i class="bi bi-pencil"></i> Edit Tournament
        </h1>
        <p class="lead text-muted">Update tournament information</p>
    </div>
</div>

<div class="row">
    <div class="col-lg-8 mx-auto">
        <div class="card">
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('edit_tournament', tournament_id=tournament.tournament_id) }}">
                    <div class="mb-4">
                        <label for="name" class="form-label">
                            <i class="bi bi-trophy"></i> Tournament Name *
                        </label>
                        <input type="text"
                               class="form-control form-control-lg"
                               id="name"
                               name="name"
                               required
                               value="{{ tournament.name }}"
                               placeholder="e.g., Spring Championship 2024">
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label for="start_date" class="form-label">
                                <i class="bi bi-calendar-check"></i> Start Date *
                            </label>
                            <input type="date"
                                   class="form-control"
                                   id="start_date"
                                   name="start_date"
                                   required
                                   value="{{ tournament.start_date.strftime('%Y-%m-%d') }}">
                        </div>
                        <div class="col-md-6">
                            <label for="end_date" class="form-label">
                                <i class="bi bi-calendar-x"></i> End Date *
                            </label>
                            <input type="date"
                                   class="form-control"
                                   id="end_date"
                                   name="end_date"
                                   required
                                   value="{{ tournament.end_date.strftime('%Y-%m-%d') }}">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">
                            <i class="bi bi-diagram-3"></i> Format
                        </label>
                        <input type="text"
                               class="form-control"
                               value="Round Robin (Double)"
                               disabled>
                    </div>

                    <div class="mb-4">
                        <label for="status" class="form-label">
                            <i class="bi bi-info-circle"></i> Status
                        </label>
                        <select class="form-select" id="status" name="status">
                            <option value="NOT_STARTED" {% if tournament.status == 'NOT_STARTED' %}selected{% endif %}>Not Started</option>
                            <option value="ONGOING" {% if tournament.status == 'ONGOING' %}selected{% endif %}>Ongoing</option>
                            <option value="COMPLETED" {% if tournament.status == 'COMPLETED' %}selected{% endif %}>Completed</option>
                        </select>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-check-circle"></i> Update Tournament
                        </button>
                        <a href="{{ url_for('tournament_detail', tournament_id=tournament.tournament_id) }}"
                           class="btn btn-outline-secondary">
                            <i class="bi bi-x-circle"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.getElementById('start_date').addEventListener('change', function() {
        document.getElementById('end_date').min = this.value;
    });
</script>
{% endblock %}
